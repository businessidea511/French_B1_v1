<!DOCTYPE html>
<html>

<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="PolyLearn French - Advanced B1 Learning with AI Multi-Language Translation">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PolyLearn">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>PolyLearn French</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #0F172A;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
      font-family: 'Inter', sans-serif;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 255, 255, 0.1);
      border-top-color: #6366F1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // PWA Install Logic
    window.deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent Chrome 67 and earlier from automatically showing the prompt
      e.preventDefault();
      // Stash the event so it can be triggered later.
      window.deferredPrompt = e;
      console.log('📦 PWA Install Prompt captured');
      
      // Notify Flutter that install is available
      if (window.onAppInstallable) {
        window.onAppInstallable();
      }
    });

    window.installPWA = async () => {
      if (!window.deferredPrompt) {
        console.log('❌ No install prompt available');
        return false;
      }
      // Show the prompt
      window.deferredPrompt.prompt();
      // Wait for the user to respond to the prompt
      const { outcome } = await window.deferredPrompt.userChoice;
      console.log(`👤 User response to install prompt: ${outcome}`);
      // We've used the prompt, and can't use it again, throw it away
      window.deferredPrompt = null;
      return outcome === 'accepted';
    };

    window.addEventListener('appinstalled', (evt) => {
      console.log('✅ App installed successfully');
    });
  </script>
</head>

<body>
  <div class="loading">
    <div class="spinner"></div>
    <p>Chargement du cours...</p>
  </div>
</body>

</html>
